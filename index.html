<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tia Betânia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: '#34C759',
                        red: '#FF3B30',
                        blue: '#007AFF',
                        grayText: '#8E8E93',
                        lightBg: '#F2F2F7',
                    },
                    fontFamily: {
                        sf: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'Helvetica Neue', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .no-select {
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                user-select: none;
            }
            .glass {
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                border: 1px solid rgba(0, 0, 0, 0.06);
                box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            }
            .btn-header {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background: rgba(0,0,0,0.04);
                display: grid;
                place-items: center;
                font-size: 18px;
                transition: background 0.2s;
            }
            .btn-header:hover {
                background: rgba(0,0,0,0.08);
            }
            .tab-active {
                background: rgba(0, 122, 255, 0.1);
                color: #007AFF;
                border-radius: 12px;
            }
            .scrollbar-hide::-webkit-scrollbar { display: none; }
            .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        }

        html, body {
            overscroll-behavior: none;
            touch-action: pan-x pan-y;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: #F2F2F7;
        }
    </style>
</head>
<body class="text-gray-900 no-select">
    <div class="max-w-md mx-auto min-h-screen relative pb-28">

        <!-- Cabeçalho -->
        <header class="sticky top-0 z-30 glass px-6 pt-12 pb-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-500 to-green-500 flex items-center justify-center text-white font-bold">
                    TB
                </div>
                <h1 class="text-xl font-semibold">Tia Betânia</h1>
            </div>
            <button onclick="abrirModal()" class="btn-header">+</button>
        </header>

        <!-- Página Home -->
        <div id="paginaHome" class="px-6 py-6 space-y-6">

            <!-- Card Saldo Total -->
            <div class="bg-white rounded-2xl p-5 shadow-sm">
                <p class="text-gray-500 text-base">Total</p>
                <h2 class="text-3xl font-bold mt-1">R$ <span id="saldoTotal">0,00</span></h2>
                <div class="grid grid-cols-2 gap-4 mt-5">
                    <div>
                        <p class="text-gray-500 text-sm">Balanço do dia</p>
                        <p class="text-lg font-medium" id="balancoDia">--</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">Rentabilidade</p>
                        <p class="text-lg font-medium" id="rentabilidadeDia">--</p>
                    </div>
                </div>
            </div>

            <!-- Gráfico -->
            <div class="bg-white rounded-2xl p-5 shadow-sm">
                <div class="h-72 flex flex-col items-center justify-center">
                    <canvas id="graficoResultados" class="w-full h-full"></canvas>
                    <p class="text-gray-500 text-sm mt-4">Gráfico com balanço de apostas</p>
                </div>
            </div>

            <!-- Resumo Geral -->
            <div class="bg-white rounded-2xl p-5 shadow-sm space-y-4">
                <div>
                    <p class="text-gray-500 text-base">Valor total investido</p>
                    <p class="text-xl font-semibold mt-1">R$ <span id="valorInvestido">0,00</span></p>
                </div>
                <div>
                    <p class="text-gray-500 text-base">Balanço total</p>
                    <p class="text-xl font-semibold" id="balancoTotal">R$ 0,00</p>
                </div>
                <div>
                    <p class="text-gray-500 text-base">Rentabilidade total</p>
                    <p class="text-xl font-semibold" id="rentabilidadeTotal">0,00%</p>
                </div>
                <div>
                    <p class="text-gray-500 text-base">Tempo total</p>
                    <p class="text-xl font-semibold" id="tempoTotal">0 dias</p>
                </div>
                <div>
                    <p class="text-gray-500 text-base">Total de apostas</p>
                    <p class="text-xl font-semibold" id="totalApostas">0</p>
                </div>
            </div>
        </div>

        <!-- Página Histórico -->
        <div id="paginaHistorico" class="hidden px-6 py-6">
            <h2 class="text-xl font-semibold mb-4">Histórico de Apostas</h2>
            <div id="listaHistorico" class="space-y-3 max-h-[calc(100vh-180px)] overflow-y-auto scrollbar-hide">
                <div class="text-center text-gray-400 py-10">
                    <i class="fa fa-history text-4xl mb-3"></i>
                    <p>Nenhuma aposta registrada ainda</p>
                </div>
            </div>
        </div>

        <!-- Menu Inferior estilo da foto -->
        <nav class="fixed bottom-4 left-4 right-4 z-40 glass rounded-2xl p-2">
            <div class="flex justify-around items-center h-16">
                <button onclick="mudarPagina('home')" id="tabHome" class="tab-active flex flex-col items-center justify-center gap-1 w-1/2 h-full">
                    <i class="fa fa-home text-xl"></i>
                    <span class="text-xs font-medium">Home</span>
                </button>
                <button onclick="mudarPagina('historico')" id="tabHistorico" class="flex flex-col items-center justify-center gap-1 w-1/2 h-full text-grayText">
                    <i class="fa fa-list-alt text-xl"></i>
                    <span class="text-xs font-medium">Histórico</span>
                </button>
            </div>
        </nav>

        <!-- Modal de Registro -->
        <div id="modalAposta" class="fixed inset-0 bg-black/50 flex items-end justify-center z-50 hidden">
            <div class="bg-white rounded-t-3xl w-full max-w-md p-6 transform transition-all duration-300">
                <div class="flex justify-between items-center mb-5">
                    <h3 class="text-xl font-semibold">Nova Aposta</h3>
                    <button onclick="fecharModal()" class="btn-header">×</button>
                </div>
                <form id="formAposta" onsubmit="salvarAposta(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Valor Apostado (R$)</label>
                        <input type="number" step="0.01" min="0.10" id="valorApostado" class="w-full border border-gray-200 rounded-xl p-3.5 focus:outline-none focus:ring-1 focus:ring-blue-400" placeholder="0,00" required>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Retorno Bruto (R$)</label>
                        <input type="number" step="0.01" min="0" id="valorRetorno" class="w-full border border-gray-200 rounded-xl p-3.5 focus:outline-none focus:ring-1 focus:ring-blue-400" placeholder="0,00" required>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Resultado</label>
                        <select id="resultado" class="w-full border border-gray-200 rounded-xl p-3.5 focus:outline-none focus:ring-1 focus:ring-blue-400" required>
                            <option value="">Selecione</option>
                            <option value="green">✅ Green (Lucro)</option>
                            <option value="red">❌ Red (Perda)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Observação (opcional)</label>
                        <input type="text" id="observacao" class="w-full border border-gray-200 rounded-xl p-3.5 focus:outline-none focus:ring-1 focus:ring-blue-400" placeholder="Ex: Futebol, Basquete...">
                    </div>
                    <button type="submit" class="w-full bg-blue hover:bg-blue/90 text-white font-medium rounded-xl p-3.5 mt-3">Salvar Aposta</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let apostas = JSON.parse(localStorage.getItem('apostasBetania')) || [];
        let grafico;

        function iniciarGrafico() {
            const ctx = document.getElementById('graficoResultados').getContext('2d');
            grafico = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Green', 'Red'],
                    datasets: [{
                        data: [0, 0],
                        backgroundColor: ['#34C759', '#FF3B30'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { font: { size: 14 } }
                        }
                    }
                }
            });
        }

        function mudarPagina(pagina) {
            document.getElementById('paginaHome').classList.toggle('hidden', pagina !== 'home');
            document.getElementById('paginaHistorico').classList.toggle('hidden', pagina !== 'historico');
            document.getElementById('tabHome').classList.toggle('tab-active', pagina === 'home');
            document.getElementById('tabHome').classList.toggle('text-grayText', pagina !== 'home');
            document.getElementById('tabHistorico').classList.toggle('tab-active', pagina === 'historico');
            document.getElementById('tabHistorico').classList.toggle('text-grayText', pagina !== 'historico');
        }

        function abrirModal() {
            document.getElementById('modalAposta').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }
        function fecharModal() {
            document.getElementById('modalAposta').classList.add('hidden');
            document.body.style.overflow = 'auto';
            document.getElementById('formAposta').reset();
        }

        function salvarAposta(e) {
            e.preventDefault();
            const valor = parseFloat(document.getElementById('valorApostado').value);
            const retorno = parseFloat(document.getElementById('valorRetorno').value);
            const resultado = document.getElementById('resultado').value;
            const obs = document.getElementById('observacao').value;
            const data = new Date();

            const nova = {
                id: Date.now(),
                valor,
                retorno,
                lucro: retorno - valor,
                resultado,
                obs,
                data: data.toLocaleDateString('pt-BR'),
                timestamp: data.getTime()
            };

            apostas.unshift(nova);
            localStorage.setItem('apostasBetania', JSON.stringify(apostas));
            fecharModal();
            atualizarDados();
        }

        function atualizarDados() {
            let totalInvestido = 0;
            let totalLucro = 0;
            let qtdGreen = 0, qtdRed = 0;
            let balancoDia = 0;
            const hoje = new Date().toLocaleDateString('pt-BR');
            const dataInicial = apostas.length ? new Date(apostas[apostas.length - 1].timestamp) : new Date();

            apostas.forEach(a => {
                totalInvestido += a.valor;
                totalLucro += a.lucro;
                if (a.resultado === 'green') qtdGreen++;
                else qtdRed++;
                if (a.data === hoje) balancoDia += a.lucro;
            });

            const rentabilidadeTotal = totalInvestido > 0 ? ((totalLucro / totalInvestido) * 100).toFixed(2) : 0;
            const diferencaDias = apostas.length ? Math.ceil((new Date() - dataInicial) / (1000 * 60 * 60 * 24)) : 0;
            const tempoTexto = diferencaDias < 30 ? `${diferencaDias} dias` : diferencaDias < 60 ? `1 mês` : `${Math.floor(diferencaDias / 30)} meses`;

            document.getElementById('saldoTotal').textContent = totalLucro.toFixed(2).replace('.', ',');
            document.getElementById('balancoDia').textContent = balancoDia.toFixed(2).replace('.', ',');
            document.getElementById('rentabilidadeDia').textContent = balancoDia !== 0 ? `${((balancoDia / (totalInvestido || 1)) * 100).toFixed(2)}%` : '--';
            document.getElementById('valorInvestido').textContent = totalInvestido.toFixed(2).replace('.', ',');
            document.getElementById('balancoTotal').textContent = `R$ ${totalLucro.toFixed(2).replace('.', ',')}`;
            document.getElementById('balancoTotal').className = `text-xl font-semibold ${totalLucro >= 0 ? 'text-green' : 'text-red'}`;
            document.getElementById('rentabilidadeTotal').textContent = `${rentabilidadeTotal}%`;
            document.getElementById('tempoTotal').textContent = tempoTexto;
            document.getElementById('totalApostas').textContent = apostas.length;

            grafico.data.datasets[0].data = [qtdGreen, qtdRed];
            grafico.update();

            atualizarHistorico();
        }

        function atualizarHistorico() {
            const lista = document.getElementById('listaHistorico');
            if (apostas.length === 0) {
                lista.innerHTML = `<div class="text-center text-gray-400 py-10"><i class="fa fa-history text-4xl mb-3"></i><p>Nenhuma aposta registrada ainda</p></div>`;
                return;
            }
            lista.innerHTML = '';
            apostas.forEach(a => {
                const cor = a.resultado === 'green' ? 'text-green' : 'text-red';
                const icone = a.resultado === 'green' ? 'fa-arrow-up' : 'fa-arrow-down';
                lista.innerHTML += `
                    <div class="bg-white rounded-xl p-4 shadow-sm flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center ${cor} bg-opacity-10 bg-${cor.replace('text-', '')}/10">
                                <i class="fa ${icone}"></i>
                            </div>
                            <div>
                                <p class="font-medium">${a.obs || 'Aposta'}</p>
                                <p class="text-xs text-gray-500">${a.data} • Apostado: R$ ${a.valor.toFixed(2).replace('.', ',')}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-semibold ${cor}">R$ ${a.lucro.toFixed(2).replace('.', ',')}</p>
                            <p class="text-xs text-gray-500">${a.resultado.toUpperCase()}</p>
                        </div>
                    </div>`;
            });
        }

        window.onload = () => {
            iniciarGrafico();
            atualizarDados();
        };
    </script>
</body>
</html>
